  <text x="130" y="104" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#c9d1d9">Jerusalem, Israel</text>
  <text x="130" y="124" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#c9d1d9">16</text>
  <text x="130" y="144" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#c9d1d9">Age 8 - 7+ years of active engineering</text>


  <!-- Divider bottom -->
  <line x1="32" y1="178" x2="688" y2="178" stroke="#21262d" stroke-width="1"/>

  <!-- Links row -->
