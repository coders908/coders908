<svg width="720" height="200" viewBox="0 0 720 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="720" height="200" rx="12" fill="url(#bg)"/>
  <!-- Top accent line -->
  <rect width="720" height="2" rx="1" fill="url(#accent)"/>
  <!-- Border -->
  <rect width="718" height="198" x="1" y="1" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="200" rx="2" fill="#ffffff" opacity="0.6"/>

  <!-- Name -->
  <text x="32" y="46" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="22" font-weight="700" fill="#ffffff">Neriya</text>

  <!-- Subtitle -->
  <text x="32" y="68" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#555555" letter-spacing="2">SYSTEM ARCHITECT  /  SECURITY-FIRST ENGINEER</text>

  <!-- Divider -->
  <line x1="32" y1="82" x2="688" y2="82" stroke="#21262d" stroke-width="1"/>

  <!-- Left column labels -->
  <text x="32" y="104" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#444d56">Location</text>
  <text x="32" y="124" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#444d56">Age</text>
  <text x="32" y="144" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#444d56">Started</text>


